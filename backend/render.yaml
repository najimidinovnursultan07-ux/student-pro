services:
  - type: web
    name: student-pro
    runtime: python
    # Корень Django-проекта (папка backend в монорепозитории)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Миграции перед каждым запуском, затем gunicorn
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
